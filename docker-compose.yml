services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: msadhesif
      POSTGRES_PASSWORD: msadhesif
      POSTGRES_DB: msadhesif
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: msadhesif
      MINIO_ROOT_PASSWORD: msadhesif_secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web → http://localhost:9001
    volumes:
      - minio_data:/data

  # Creates the default bucket on first start
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 msadhesif msadhesif_secret;
        mc mb --ignore-existing local/ms-adhesif;
        echo 'Bucket ms-adhesif ready.';
      "

  # ─── Next.js application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - minio

  # ─── DB migrations (runs once at deploy, then exits) ───────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      - postgres
    command: ["node", "-e", "require('./scripts/migrate-prod.cjs')"]

volumes:
  postgres_data:
  minio_data:
